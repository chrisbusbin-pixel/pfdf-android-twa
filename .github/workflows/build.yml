name: Build Android AAB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore app/keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias pfdf-key \
            -storepass pfdf2026store \
            -keypass pfdf2026key \
            -dname "CN=Prop Firm Deal Finder, OU=Engineering, O=Prop Firm Deal Finder, L=San Jose, ST=California, C=US"

      - name: Create app icons
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          curl -L "https://propfirmdealfinder.com/icons/icon-512.png" -o icon_512.png
          convert icon_512.png -resize 48x48 app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon_512.png -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon_512.png -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon_512.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon_512.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build release AAB
        run: gradle bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: pfdf-android-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: pfdf-signing-keystore
          path: app/keystore.jks
